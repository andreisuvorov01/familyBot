version: '3.8'

services:
  # PostgreSQL база данных
  postgres:
    image: postgres:15-alpine
    container_name: familybot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: familybot
      POSTGRES_USER: familyuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    networks:
      - familybot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U familyuser -d familybot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis для кэширования и rate limiting
  redis:
    image: redis:7-alpine
    container_name: familybot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - familybot-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI приложение
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: familybot-api
    restart: unless-stopped
    environment:
      # База данных
      DATABASE_URL: postgresql+asyncpg://familyuser:${POSTGRES_PASSWORD:-changeme123}@postgres:5432/familybot
      # Redis
      REDIS_URL: redis://redis:6379/0
      ENABLE_REDIS: "true"
      # Telegram
      BOT_TOKEN: ${BOT_TOKEN}
      WEBAPP_URL: https://my-family-tasks.duckdns.org
      # Безопасность
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 30
      # Настройки
      TIMEZONE: Europe/Moscow
      DEBUG: ${DEBUG:-false}
      ENVIRONMENT: production
      # Rate limiting
      RATE_LIMIT_REQUESTS: 100
      RATE_LIMIT_WINDOW: 60
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./app/static:/app/app/static
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - familybot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Telegram бот
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: familybot-bot
    restart: unless-stopped
    environment:
      # База данных
      DATABASE_URL: postgresql+asyncpg://familyuser:${POSTGRES_PASSWORD:-changeme123}@postgres:5432/familybot
      # Telegram
      BOT_TOKEN: ${BOT_TOKEN}
      WEBAPP_URL: https://my-family-tasks.duckdns.org
      # Настройки
      TIMEZONE: Europe/Moscow
      DEBUG: ${DEBUG:-false}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - familybot-network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3

  # Nginx для reverse proxy и SSL
  nginx:
    image: nginx:alpine
    container_name: familybot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./app/static:/usr/share/nginx/html/static:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - familybot-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Certbot для SSL сертификатов
  certbot:
    image: certbot/certbot
    container_name: familybot-certbot
    restart: unless-stopped
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/logs:/var/log/letsencrypt
    depends_on:
      - nginx
    networks:
      - familybot-network
    command: certonly --webroot --webroot-path=/usr/share/nginx/html -d my-family-tasks.duckdns.org --email ${CERTBOT_EMAIL} --agree-tos --no-eff-email --force-renewal

  # Prometheus для мониторинга
  prometheus:
    image: prom/prometheus:latest
    container_name: familybot-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - familybot-network

  # Grafana для визуализации
  grafana:
    image: grafana/grafana:latest
    container_name: familybot-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - familybot-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  familybot-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16