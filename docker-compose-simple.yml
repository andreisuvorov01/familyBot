version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: familybot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: familybot
      POSTGRES_USER: familyuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U familyuser -d familybot"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: familybot-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://familyuser:${POSTGRES_PASSWORD:?err}@postgres:5432/familybot
      BOT_TOKEN: ${BOT_TOKEN:?BOT_TOKEN must be set}
      WEBAPP_URL: ${WEBAPP_URL:?WEBAPP_URL must be set}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      TIMEZONE: Europe/Moscow
      DEBUG: ${DEBUG:-false}
      ENVIRONMENT: production
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./app/static:/app/app/static
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: familybot-bot
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://familyuser:${POSTGRES_PASSWORD:?err}@postgres:5432/familybot
      BOT_TOKEN: ${BOT_TOKEN:?BOT_TOKEN must be set}
      WEBAPP_URL: ${WEBAPP_URL:?WEBAPP_URL must be set}
      TIMEZONE: Europe/Moscow
      DEBUG: ${DEBUG:-false}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
