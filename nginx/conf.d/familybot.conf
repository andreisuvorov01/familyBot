# Конфигурация для Family Bot с SSL

# HTTP редирект на HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name my-family-tasks.duckdns.org;
    
    # ACME challenge для Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }
    
    # Редирект всего остального на HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
    
    access_log /var/log/nginx/http_access.log main;
    error_log /var/log/nginx/http_error.log warn;
}

# HTTPS сервер
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name my-family-tasks.duckdns.org;
    
    # SSL сертификаты
    ssl_certificate /etc/nginx/ssl/live/my-family-tasks.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/my-family-tasks.duckdns.org/privkey.pem;
    
    # SSL настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    
    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    
    # Безопасные заголовки
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval';" always;
    
    # Корневая директория
    root /usr/share/nginx/html;
    index index.html;
    
    # Статические файлы
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Безопасность для статики
        add_header X-Content-Type-Options "nosniff";
        add_header X-Frame-Options "DENY";
        
        # Gzip для статики
        gzip_static on;
    }
    
    # API прокси
    location / {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Таймауты
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Буферизация
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # WebSocket поддержка
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    # Health check endpoint
    location /health {
        proxy_pass http://api:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }
    
    # Документация API
    location /docs {
        proxy_pass http://api:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /redoc {
        proxy_pass http://api:8000/redoc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # Блокировка sensitive endpoints
    location ~* ^/(\.git|\.env|config\.py|secret) {
        deny all;
        return 404;
    }
    
    # Логирование
    access_log /var/log/nginx/https_access.log main;
    error_log /var/log/nginx/https_error.log warn;
}

# Мониторинг (только с локального IP)
server {
    listen 9090;
    server_name my-family-tasks.duckdns.org;
    
    location / {
        proxy_pass http://prometheus:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Разрешаем только локальный доступ
        allow 127.0.0.1;
        allow 172.20.0.0/16;  # Docker сеть
        deny all;
    }
}

# Grafana (только с локального IP)
server {
    listen 3000;
    server_name my-family-tasks.duckdns.org;
    
    location / {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Разрешаем только локальный доступ
        allow 127.0.0.1;
        allow 172.20.0.0/16;  # Docker сеть
        deny all;
    }
}